<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rakhiya Badi Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

  background: url('bg.jpg') no-repeat center/cover;
}

/* DARK OVERLAY */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;

  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
nav h2 {
  color: white;
}
nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* HERO */
.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 60px 40px;
  color: white;
}

.hero h1 {
  font-size: 42px;
}
.hero span {
  color: #ffcc00;
}

.hero img {
  width: 300px;
  border-radius: 20px;
}

/* GLASS CARD */
.glass {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

/* STEPS */
.steps {
  padding: 20px;
}

.step {
  display: flex;
  gap: 20px;
  padding: 20px;
  margin: 15px 0;
  color: white;
}

.step img {
  width: 70px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  background: #ff9800;
  color: white;
  padding: 12px 25px;
  border-radius: 25px;
  text-decoration: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 15px;
  color: white;
}
</style>

</head>

<body>

<nav class="glass">
  <h2>Rakhiya Badi</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Recipes</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <div>
    <h1>How to Cook <span>Rakhiya Badi</span></h1>
    <p>Ready in 5 minutes | Easy & Tasty</p>
    <a href="#" class="btn">Start Recipe</a>
  </div>
  <img src="https://images.unsplash.com/photo-1604908811643-4fef0b2d2c62">
</section>

<section class="steps">

<div class="step glass">
  <img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png">
  <div>
    <h3>1. Heat Oil</h3>
    <p>Heat 1–2 tsp oil.</p>
  </div>
</div>

<div class="step glass">
  <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
  <div>
    <h3>2. Add Onion</h3>
    <p>Fry onion & spices.</p>
  </div>
</div>

<div class="step glass">
  <img src="https://cdn-icons-png.flaticon.com/512/2921/2921822.png">
  <div>
    <h3>3. Add Badi</h3>
    <p>Cook with water.</p>
  </div>
</div>

<div class="step glass">
  <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
  <div>
    <h3>4. Serve</h3>
    <p>Serve hot.</p>
  </div>
</div>

</section>

<footer>
  Premium UI 🔥 Rakhiya Badi
</footer>

</body>
</html>
